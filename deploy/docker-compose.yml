version: "3.9"

services:
  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    volumes:
      - ./data/backend:/app/data
    restart: unless-stopped

  admin:
    build:
      context: ../admin
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./data/backend/uploads:/srv/uploads:ro
    depends_on:
      - backend
      - admin
    restart: unless-stopped
