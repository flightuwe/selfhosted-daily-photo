version: "3.9"

services:
  dozzle:
    image: amir20/dozzle:v8.14.9
    container_name: shp-dozzle
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "13380:8080"
    environment:
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_LEVEL=info
      - DOZZLE_FILTER=name=shp-
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
