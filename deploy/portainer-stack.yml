version: "3.9"

services:
  backend:
    image: ghcr.io/flightuwe/selfhosted-bereal-backend:latest
    container_name: shp-backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - APP_ADDRESS=:8080
      - DB_PATH=/app/data/app.db
      - UPLOAD_DIR=/app/data/uploads
      - JWT_SECRET=REPLACE_WITH_LONG_RANDOM_SECRET
      - TOKEN_TTL_HOURS=72
      - CORS_ORIGINS=https://daily.teacloud.synology.me
      - PUBLIC_BASE_URL=https://daily.teacloud.synology.me
      - APP_TIMEZONE=Europe/Berlin
      - SCHEDULER_ENABLED=true
      - BOOTSTRAP_ADMIN_USER=admin
      - BOOTSTRAP_ADMIN_PASSWORD=REPLACE_WITH_STRONG_ADMIN_PASSWORD
    volumes:
      - /volume1/docker/selfhosted-daily-photo/backend-data:/app/data:rw

  admin:
    image: ghcr.io/flightuwe/selfhosted-bereal-admin:latest
    container_name: shp-admin
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  gateway:
    image: nginx:1.27-alpine
    container_name: shp-gateway
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      - backend
      - admin
    ports:
      - "13379:80"
    command: >
      /bin/sh -c "
      cat <<'EOF' > /etc/nginx/conf.d/default.conf
      server {
        listen 80;
        server_name _;

        client_max_body_size 20M;

        location /api/ {
          proxy_pass http://backend:8080/api/;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-Proto $$scheme;
        }

        location /uploads/ {
          proxy_pass http://backend:8080/uploads/;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          add_header Cache-Control 'public, max-age=31536000';
        }

        location / {
          proxy_pass http://admin:80/;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
        }
      }
      EOF
      && nginx -g 'daemon off;'
      "
