version: "3.9"

# DEBUG SWITCH (visible)
# 1) Set DEBUGGING to "on" or "off" below.
# 2) In Portainer stack environment vars:
#    - if DEBUGGING=on  -> set COMPOSE_PROFILES=debug
#    - if DEBUGGING=off -> remove COMPOSE_PROFILES
x-debug:
  DEBUGGING: "off"

services:
  backend:
    image: ghcr.io/flightuwe/selfhosted-bereal-backend:latest
    container_name: shp-backend
    user: "0:0"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - APP_ADDRESS=:8080
      - DB_PATH=/app/data/app.db
      - UPLOAD_DIR=/app/data/uploads
      - JWT_SECRET=HIER_LANGES_RANDOM_SECRET_EINTRAGEN
      - TOKEN_TTL_HOURS=72
      - CORS_ORIGINS=https://daily.teacloud.synology.me
      - PUBLIC_BASE_URL=https://daily.teacloud.synology.me
      - APP_TIMEZONE=Europe/Berlin
      - SCHEDULER_ENABLED=true
      - APP_VERSION=dev
      - BOOTSTRAP_ADMIN_USER=admin
      - BOOTSTRAP_ADMIN_PASSWORD=HIER_STARKES_ADMIN_PASSWORT_EINTRAGEN
      - FCM_ENABLED=true
      - FCM_PROJECT_ID=HIER_DEIN_FIREBASE_PROJECT_ID
      - FCM_SERVICE_ACCOUNT_FILE=/app/secrets/firebase-service-account.json
    volumes:
      - /volume1/docker/selfhosted-daily-photo/backend-data:/app/data:rw
      - /volume1/docker/selfhosted-daily-photo/secrets:/app/secrets:ro
    networks:
      - shp-net

  admin:
    image: ghcr.io/flightuwe/selfhosted-bereal-admin:latest
    container_name: shp-admin
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - shp-net

  gateway:
    image: nginx:1.27-alpine
    container_name: shp-gateway
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      - backend
      - admin
    ports:
      - "13379:80"
    volumes:
      - /volume1/docker/selfhosted-daily-photo/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shp-net

  dozzle:
    image: amir20/dozzle:v8.14.9
    container_name: shp-dozzle
    restart: unless-stopped
    profiles: ["debug"]
    security_opt:
      - no-new-privileges:true
    ports:
      - "13380:8080"
    environment:
      - DEBUGGING=${DEBUGGING:-off}
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_LEVEL=info
      - DOZZLE_FILTER=name=shp-
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - shp-net

networks:
  shp-net:
    driver: bridge
