version: "3.9"

services:
  backend:
    image: ghcr.io/flightuwe/selfhosted-bereal-backend:latest
    container_name: shp-backend
    restart: unless-stopped
    environment:
      - APP_ADDRESS=:8080
      - DB_PATH=/app/data/app.db
      - UPLOAD_DIR=/app/data/uploads
      - JWT_SECRET=CHANGE_ME_LONG_RANDOM_SECRET
      - TOKEN_TTL_HOURS=72
      - CORS_ORIGINS=https://photos.example.com
      - PUBLIC_BASE_URL=https://photos.example.com
      - APP_TIMEZONE=Europe/Berlin
      - SCHEDULER_ENABLED=true
      - BOOTSTRAP_ADMIN_USER=admin
      - BOOTSTRAP_ADMIN_PASSWORD=CHANGE_ME_STRONG_PASSWORD
    volumes:
      - backend-data:/app/data

  admin:
    image: ghcr.io/flightuwe/selfhosted-bereal-admin:latest
    container_name: shp-admin
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    container_name: shp-gateway
    restart: unless-stopped
    depends_on:
      - backend
      - admin
    ports:
      - "8088:80"
    command: >
      /bin/sh -c "
      cat <<'EOF' > /etc/nginx/conf.d/default.conf
      server {
        listen 80;
        server_name _;

        client_max_body_size 20M;

        location /api/ {
          proxy_pass http://backend:8080/api/;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-Proto $$scheme;
        }

        location /uploads/ {
          proxy_pass http://backend:8080/uploads/;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
        }

        location / {
          proxy_pass http://admin:80/;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
        }
      }
      EOF
      && nginx -g 'daemon off;'
      "

volumes:
  backend-data:
