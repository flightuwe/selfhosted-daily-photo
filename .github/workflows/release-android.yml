name: release-android

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
      - name: Verify toolchain
        run: |
          java -version
          gradle --version
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la "$ANDROID_SDK_ROOT" || true
      - name: Build release APK (capture log)
        run: |
          set -o pipefail
          gradle -p android :app:assembleRelease --stacktrace 2>&1 | tee android-build.log
      - name: Show generated APK files
        if: always()
        run: ls -la android/app/build/outputs/apk/release || true
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: android-build.log
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  github-release:
    needs: build-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
