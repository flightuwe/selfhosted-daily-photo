name: Release Android APK

on:
  push:
    tags:
      - "v*"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
          gradle-version: "8.2.1"
      - name: Prepare Android SDK
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          if command -v sdkmanager >/dev/null 2>&1; then
            yes | sdkmanager --licenses >/dev/null || true
            sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" || true
          fi
      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          [ -n "$ANDROID_KEYSTORE_BASE64" ] || (echo "::error::Missing secret ANDROID_KEYSTORE_BASE64" && exit 1)
          [ -n "$ANDROID_KEY_ALIAS" ] || (echo "::error::Missing secret ANDROID_KEY_ALIAS" && exit 1)
          [ -n "$ANDROID_KEYSTORE_PASSWORD" ] || (echo "::error::Missing secret ANDROID_KEYSTORE_PASSWORD" && exit 1)
          [ -n "$ANDROID_KEY_PASSWORD" ] || (echo "::error::Missing secret ANDROID_KEY_PASSWORD" && exit 1)
          [ -n "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" ] || (echo "::error::Missing secret ANDROID_GOOGLE_SERVICES_JSON_BASE64" && exit 1)
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.keystore
          echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
          echo "ANDROID_KEYSTORE_PATH=$GITHUB_WORKSPACE/android/release.keystore" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> $GITHUB_ENV
      - name: Verify toolchain
        run: |
          java -version
          gradle --version
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la "$ANDROID_SDK_ROOT" || true
      - name: Build release APK (capture log)
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          gradle -p android :app:assembleRelease --no-daemon --stacktrace --console=plain 2>&1 | tee android-build.log
      - name: Show generated APK files
        if: always()
        run: ls -la android/app/build/outputs/apk/release || true
      - name: Emit compact build error
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" != "success" ]; then
            msg=$(awk '/\* What went wrong:/{flag=1;next}/\* Try:/{flag=0}flag' android-build.log | head -n 40 | tr '\n' ' ')
            kmsg=$(grep -E '^e: ' android-build.log | head -n 25 | tr '\n' ' ')
            if [ -z "$msg" ]; then
              msg=$(grep -E "Execution failed for task|Could not resolve|SDK location not found|Plugin \[id:" android-build.log | head -n 10 | tr '\n' ' ')
            fi
            if [ -n "$kmsg" ]; then
              msg="$msg KotlinErrors: $kmsg"
            fi
            if [ -z "$msg" ]; then
              msg=$(tail -n 40 android-build.log | tr '\n' ' ')
            fi
            echo "::error title=Android build summary::$msg"
          fi
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: android-build.log
      - name: Upload APK artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
      - name: Fail job if build failed
        if: steps.build.outcome != 'success'
        run: exit 1

  github-release:
    needs: build-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: dist
      - name: Generate release notes and changelog asset
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_TAG="${GITHUB_REF_NAME}"
          [[ "$CURRENT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]] || (echo "::error::Expected semantic tag like v0.3.41" && exit 1)

          MANUAL_MD=".github/release-notes/${CURRENT_TAG}.md"
          MANUAL_JSON=".github/release-notes/${CURRENT_TAG}.json"
          if [[ -f "$MANUAL_MD" ]]; then
            cp "$MANUAL_MD" release-notes.md
            if [[ -f "$MANUAL_JSON" ]]; then
              cp "$MANUAL_JSON" dist/changelog.json
              exit 0
            fi
          fi

          git fetch --tags --force >/dev/null 2>&1 || true
          PREV_TAG="$(git tag --sort=-creatordate | grep '^v' | grep -vx "$CURRENT_TAG" | head -n 1 || true)"

          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD~40..HEAD"
          fi

          mapfile -t RAW_COMMITS < <(git log --no-merges --pretty=format:'%s' $RANGE 2>/dev/null || true)
          if [[ ${#RAW_COMMITS[@]} -eq 0 ]]; then
            mapfile -t RAW_COMMITS < <(git log --no-merges --pretty=format:'%s' -n 20 2>/dev/null || true)
          fi

          declare -A seen
          HIGHLIGHTS=()
          for msg in "${RAW_COMMITS[@]}"; do
            clean="$(echo "$msg" | sed -E 's/[[:space:]]+/ /g; s/^ +//; s/ +$//')"
            [[ -z "$clean" ]] && continue
            key="$(echo "$clean" | tr '[:upper:]' '[:lower:]')"
            if [[ -z "${seen[$key]+x}" ]]; then
              seen[$key]=1
              HIGHLIGHTS+=("$clean")
            fi
            [[ ${#HIGHLIGHTS[@]} -ge 20 ]] && break
          done

          if [[ ${#HIGHLIGHTS[@]} -eq 0 ]]; then
            HIGHLIGHTS=("Interne Verbesserungen und Stabilitaetsupdates.")
          fi

          {
            echo "## Daily ${CURRENT_TAG}"
            echo
            echo "### Highlights"
            for h in "${HIGHLIGHTS[@]}"; do
              echo "- $h"
            done
            echo
            echo "### Assets"
            echo "- Android APK: \`app-release.apk\`"
            echo "- Changelog JSON: \`changelog.json\`"
          } > release-notes.md

          highlights_json="$(printf '%s\n' "${HIGHLIGHTS[@]}" | jq -R . | jq -s .)"
          jq -n \
            --arg version "${CURRENT_TAG#v}" \
            --arg releasedAt "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --argjson highlights "$highlights_json" \
            '{version:$version,releasedAt:$releasedAt,highlights:$highlights,details:[]}' > changelog.json

          cp changelog.json dist/changelog.json
      - name: Validate release artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -s release-notes.md || (echo "::error::release-notes.md missing or empty" && exit 1)
          test -s dist/changelog.json || (echo "::error::dist/changelog.json missing or empty" && exit 1)
          compgen -G "dist/*.apk" >/dev/null || (echo "::error::No APK in dist/" && exit 1)
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/*.apk
            dist/changelog.json
