name: Publish Server Images

on:
  push:
    branches: ["main"]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            context: backend
          - name: admin
            context: admin
    steps:
      - uses: actions/checkout@v4
      - name: Derive build vars
        id: vars
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "server_version=srv-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR (retry)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          n=0
          until [ "$n" -ge 5 ]
          do
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin && break
            n=$((n+1))
            sleep $((5*n))
          done
          [ "$n" -lt 5 ] || (echo "::error::GHCR login failed after retries" && exit 1)
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.server_version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/daily-${{ matrix.name }}:latest
            ghcr.io/${{ github.repository_owner }}/daily-${{ matrix.name }}:sha-${{ steps.vars.outputs.sha_short }}
            ghcr.io/${{ github.repository_owner }}/daily-${{ matrix.name }}:${{ steps.vars.outputs.server_version }}
