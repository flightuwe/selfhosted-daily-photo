name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: backend/go.mod
      - run: go mod tidy
      - run: go test ./...

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
          gradle-version: "8.2.1"
      - name: Prepare Android SDK
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          if command -v sdkmanager >/dev/null 2>&1; then
            yes | sdkmanager --licenses >/dev/null || true
            sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" || true
          fi
      - name: Build debug APK
        run: gradle -p android :app:assembleDebug --no-daemon --stacktrace --console=plain
